name: Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip \
            openjdk-17-jdk \
            python3-pip python3-venv \
            libffi-dev libssl-dev \
            libjpeg-dev zlib1g-dev \
            libbz2-dev liblzma-dev \
            libsqlite3-dev libncurses5-dev libreadline-dev \
            libgdbm-dev libgdbm-compat-dev \
            autoconf libtool pkg-config

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade buildozer cython==0.29.36

      - name: Set up Android SDK (accept licenses)
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"

          # Ensure modern cmdline-tools sdkmanager exists (older tools/bin sdkmanager breaks on Java 9+ due to JAXB).
          if [ ! -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "$SDK_ROOT/cmdline-tools"
            cd "$RUNNER_TEMP"
            curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            unzip -q cmdline-tools.zip -d "$SDK_ROOT/cmdline-tools"
            mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          fi

          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools:$PATH"

          # If legacy sdkmanager exists, replace it with a shim to the modern one (p4a may call tools/bin/sdkmanager).
          mkdir -p "$SDK_ROOT/tools/bin"
          cat > "$SDK_ROOT/tools/bin/sdkmanager" <<'EOF'
          #!/usr/bin/env bash
          exec "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools/latest/bin/sdkmanager" "$@"
          EOF
          chmod +x "$SDK_ROOT/tools/bin/sdkmanager"

          # sdkmanager may close stdin early; ignore "Broken pipe" from `yes` under pipefail
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        env:
          BUILDOZER_LOG_LEVEL: "2"
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: take-umbrella-apk
          path: |
            bin/*.apk

